name: Wire reward fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/wire-reward-fix.yml'

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add reward fix script
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text()
          tag = '<script src="assets/reward-fix.js?v=11.35"></script>'
          if tag not in s:
              anchor = '<script src="assets/assets.js?v=10.52"></script>'
              if anchor not in s:
                  raise SystemExit('assets.js script tag not found')
              s = s.replace(anchor, anchor + '\n' + tag, 1)
              p.write_text(s)
          PY
      - name: Commit patched index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Load sequential reward fix"
          git push
